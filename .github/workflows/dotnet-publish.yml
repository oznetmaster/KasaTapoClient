name: Publish .NET Package

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore solution
        run: dotnet restore KasaClient.slnx

      - name: Build solution
        run: dotnet build KasaClient.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test KasaClient.Tests/KasaClient.Tests.csproj --configuration Release --no-build --framework net10.0

      - name: Pack library
        run: dotnet pack KasaClient/KasaTapoClient.csproj --configuration Release --no-build --output ./artifacts/nuget

      - name: Publish package
        run: dotnet nuget push "./artifacts/nuget/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
